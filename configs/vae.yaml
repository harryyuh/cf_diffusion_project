# VAE training config
seed: 42
device: cuda
output_dir: /scratch/gilbreth/yu1331/ckpts/cf_vae
# Data on scratch
data_root: /scratch/gilbreth/yu1331/datasets/global
father_key: thickness
train_split: train
val_split: val
data_mode: images_csv
# If using npz/pt: set train_data_file, val_data_file, image_key
batch_size: 64
num_workers: 0
epochs: 100
lr: 0.001
latent_dim: 32
beta_vae: 1.0
recon_loss: mse
in_channels: 1
image_size: 28
hidden_dims: [32, 64, 128]
# Parent prediction from first n_parent_dims of z (regression: |phi(z1)-A|^2). 0 = off, no external classifier.
n_parent_dims: 4
parent_pred_hidden: 32
parent_pred_weight: 1.0
# Adversary D(z_rest)->A: encoder gets reversed grad so z_rest cannot predict A. use_adversary=true + adv_weight>0.
use_adversary: true
adv_hidden: 32
adv_weight: 0.2
